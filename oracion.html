<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&amp;family=Open+Sans:wght@300;400;500;600;700&amp;family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#1E3A5F",
                    "secondary": "#D4AF37", // Saturated gold for high contrast as per accessibility report
                    "on-background": "#1A1A1A",
                    "background": "#FFFFFF",
                    "surface": "#FFFFFF",
                    "surface-container": "#F6F3F2",
                    "outline-variant": "#D1D5DB",
                    "on-primary": "#D4AF37",
                    "on-surface-variant": "#4B5563"
            },
            "borderRadius": {
                    "DEFAULT": "0.75rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Playfair Display", "serif"],
                    "body": ["Open Sans", "sans-serif"],
                    "sacred": ["Cormorant Garamond", "serif"],
                    "label": ["Open Sans", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        /* High weight for better contrast/visibility for seniors */
        font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 24;
      }
      .bead-shadow {
        box-shadow: 0 4px 12px rgba(30, 58, 95, 0.08);
      }
      .active-bead-glow {
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
      }
      body {
        min-height: 100dvh;
      }
      /* Ensure focus states are visible for accessibility */
      button:focus-visible {
        outline: 3px solid #D4AF37;
        outline-offset: 2px;
      }
    </style>
</head>
<body class="bg-surface text-on-background min-h-screen flex flex-col antialiased">
    <audio id="audio-rosario" preload="auto"></audio>

    <div class="flex-1 flex flex-col relative w-full max-w-md mx-auto bg-cover bg-center transition-all duration-700" id="dynamic-bg" style="background-image: url('https://images.unsplash.com/photo-1548625361-998801f99c83?q=80&amp;w=2071&amp;auto=format&amp;fit=crop');">
      <div class="absolute inset-0 bg-primary/85 backdrop-blur-[2px]"></div>
      
      <div class="relative flex-1 flex flex-col p-6 text-white z-10">
        <header class="flex items-center justify-between mb-8">
          <button aria-label="Regresar al inicio" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/10 hover:bg-white/20 active:scale-95 transition-all" onclick="window.location.href='index.html'">
            <span class="material-symbols-outlined text-xl">arrow_back</span>
          </button>
          <div class="text-center">
            <p class="font-sacred text-xs tracking-widest text-secondary font-bold uppercase mb-1">MISTERIO 1 — DOLOROSOS</p>
            <h2 class="font-headline text-2xl text-primary font-bold hidden"></h2>
          </div>
          <button id="btn-ajustes-manual" class="px-4 py-2 rounded-xl bg-white/10 hover:bg-white/20 active:scale-95 transition-all text-xs font-bold tracking-wider">
            AJUSTES
          </button>
        </header>

        <main class="flex-1 flex flex-col justify-between gap-6">
          <section aria-label="Texto de la oración" class="flex-1 flex flex-col justify-center bg-white rounded-3xl p-8 shadow-2xl border border-white/20 my-auto max-h-[60vh] overflow-y-auto">
            <p class="font-body text-base md:text-lg text-on-background/80 leading-relaxed text-justify">
              <span class="block text-center font-sacred text-2xl md:text-3xl text-primary font-bold mb-4">Meditación</span>
              Cargando reflexiones sagradas...
            </p>
          </section>

          <section aria-label="Controles de audio" class="bg-white/10 backdrop-blur-md rounded-2xl p-4 flex flex-col gap-4 border border-white/10">
            <div class="flex items-center justify-between px-2">
              <span class="text-xs text-white/60 font-medium">Audio Guía</span>
              <span id="txt-progreso-misterio" class="text-xs text-secondary font-bold">Misterio 1 de 5</span>
            </div>
            
            <div class="flex items-center justify-center gap-6">
              <button id="btn-retceder" class="w-12 h-12 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 text-white active:scale-90 transition-all">
                <span class="material-symbols-outlined text-2xl">replay_10</span>
              </button>
              
              <button id="btn-master-play" class="w-16 h-16 flex items-center justify-center rounded-full bg-secondary text-primary shadow-lg shadow-secondary/20 hover:scale-105 active:scale-95 transition-all">
                <span class="material-symbols-outlined text-4xl fill-1">play_arrow</span>
              </button>
              
              <button id="btn-adelantar" class="w-12 h-12 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 text-white active:scale-90 transition-all">
                <span class="material-symbols-outlined text-2xl">forward_10</span>
              </button>
            </div>
          </section>

          <nav class="flex items-center justify-between bg-primary-container/40 rounded-xl p-2 border border-white/5">
            <button id="btn-nav-anterior" class="flex items-center gap-2 px-4 py-3 rounded-xl text-white/80 hover:text-white active:scale-95 transition-all text-sm font-semibold">
              <span class="material-symbols-outlined text-sm">arrow_back_ios</span> ANTERIOR
            </button>
            <div class="flex gap-1.5 items-center">
              <div class="w-2 h-2 rounded-full bg-secondary"></div>
              <div class="w-1.5 h-1.5 rounded-full bg-white/30"></div>
              <div class="w-1.5 h-1.5 rounded-full bg-white/30"></div>
              <div class="w-1.5 h-1.5 rounded-full bg-white/30"></div>
              <div class="w-1.5 h-1.5 rounded-full bg-white/30"></div>
            </div>
            <button id="btn-nav-siguiente" class="flex items-center gap-2 px-6 py-3 rounded-xl bg-secondary text-primary font-bold shadow-lg active:scale-95 transition-all text-sm">
              SIGUIENTE <span class="material-symbols-outlined text-sm">arrow_forward_ios</span>
            </button>
          </nav>
        </main>
      </div>
    </div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Obtener misterio seleccionado del Home
        const tipoMisterioActual = localStorage.getItem('misterioSeleccionado') || 'Gozosos';
        let listaMisterios = [];
        let indiceActual = 0;

        // Elementos interactivos del HTML
        const cabeceraMisterio = document.querySelector('.font-sacred.text-secondary'); 
        const cuadroTextoCentral = document.querySelector('section[aria-label="Texto de la oración"] p'); 
        const bgDinamico = document.getElementById('dynamic-bg');
        const audioMotor = document.getElementById('audio-rosario');
        const txtProgreso = document.getElementById('txt-progreso-misterio');

        // Botones multimedia y de navegación
        const btnPlayPausa = document.getElementById('btn-master-play');
        const iconoPlayPausa = btnPlayPausa ? btnPlayPausa.querySelector('.material-symbols-outlined') : null;
        const btnAjustes = document.getElementById('btn-ajustes-manual');
        const btnAnterior = document.getElementById('btn-nav-anterior');
        const btnSiguiente = document.getElementById('btn-nav-siguiente');
        const btnRet = document.getElementById('btn-retceder');
        const btnAde = document.getElementById('btn-adelantar');

        // Redirección de Ajustes manuales
        if (btnAjustes) {
            btnAjustes.addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = 'misterios.html';
            });
        }

        // 2. Leer archivo JSON nativo
        fetch('rosario.json')
            .then(response => {
                if (!response.ok) throw new Error("Error cargando el archivo");
                return response.json();
            })
            .then(data => {
                const termino = tipoMisterioActual.replace('sos', '');
                listaMisterios = data.filter(item => item["Tipo de Misterio"] && item["Tipo de Misterio"].includes(termino));

                if (listaMisterios.length > 0) {
                    cargarContenidoMisterio(0);
                } else {
                    if (cuadroTextoCentral) cuadroTextoCentral.textContent = `No se encontraron misterios tipo ${tipoMisterioActual}`;
                }
            })
            .catch(err => {
                console.error(err);
                if (cuadroTextoCentral) cuadroTextoCentral.textContent = "Error al enlazar con rosario.json";
            });

        // 3. Función de actualización de interfaz
        function cargarContenidoMisterio(indice) {
            if (indice < 0 || indice >= listaMisterios.length) return;
            indiceActual = indice;
            const misterio = listaMisterios[indiceActual];

            // Inyectar textos dinámicos organizados
            if (cabeceraMisterio) {
                cabeceraMisterio.textContent = `MISTERIO ${misterio["Número de Misterio"] || (indiceActual + 1)} — ${tipoMisterioActual.toUpperCase()}`;
            }
            if (cuadroTextoCentral) {
                cuadroTextoCentral.innerHTML = `<span class="block text-center font-sacred text-xl md:text-2xl text-primary font-bold mb-3">${misterio["Título del Misterio"]}</span><span class="block text-xs text-center text-secondary font-bold tracking-widest uppercase mb-4">Meditación</span>${misterio["Texto de Meditación"]}`;
            }
            if (txtProgreso) {
                txtProgreso.textContent = `Misterio ${indiceActual + 1} de 5`;
            }

            // Cambiar fondo de pantalla
            if (bgDinamico && misterio["Enlace de Imagen"]) {
                bgDinamico.style.backgroundImage = `url('${misterio["Enlace de Imagen"]}')`;
            }

            // Cargar pista de audio directo
            if (audioMotor && misterio["Enlace de Audio"]) {
                audioMotor.src = misterio["Enlace de Audio"];
                audioMotor.load();
                
                // Si ya venía reproduciendo, mantener el flujo al pasar de pantalla
                if (iconoPlayPausa && iconoPlayPausa.textContent === 'pause') {
                    audioMotor.play().catch(e => console.log("Audio en pausa"));
                }
            }

            actualizarCuentasFlujo(indiceActual);
        }

        // Pintar indicadores esféricos inferiores
        function actualizarCuentasFlujo(misterioIdx) {
            const esferas = document.querySelectorAll('nav div div');
            esferas.forEach((esfera, idx) => {
                if (idx === misterioIdx) {
                    esfera.className = "w-2.5 h-2.5 rounded-full bg-secondary transition-all transform scale-125 shadow-lg shadow-secondary/50";
                } else if (idx < misterioIdx) {
                    esfera.className = "w-2 h-2 rounded-full bg-primary opacity-40 transition-all";
                } else {
                    esfera.className = "w-2 h-2 rounded-full bg-white/30 transition-all";
                }
            });
        }

        // 4. Lógica Multimedia (Play / Pausa Real)
        if (btnPlayPausa && audioMotor) {
            btnPlayPausa.addEventListener('click', (e) => {
                e.preventDefault();
                if (audioMotor.paused) {
                    audioMotor.play()
                        .then(() => {
                            if (iconoPlayPausa) iconoPlayPausa.textContent = 'pause';
                        })
                        .catch(err => console.error("Error al reproducir audio:", err));
                } else {
                    audioMotor.pause();
                    if (iconoPlayPausa) iconoPlayPausa.textContent = 'play_arrow';
                }
            });
        }

        // Controles de salto de 10 segundos
        if (btnRet) btnRet.addEventListener('click', () => { audioMotor.currentTime = Math.max(0, audioMotor.currentTime - 10); });
        if (btnAde) btnAde.addEventListener('click', () => { audioMotor.currentTime = Math.min(audioMotor.duration || 0, audioMotor.currentTime + 10); });

        // 5. Botones de Navegación Inferior
        if (btnSiguiente) {
            btnSiguiente.addEventListener('click', (e) => {
                e.preventDefault();
                if (indiceActual < listaMisterios.length - 1) {
                    cargarContenidoMisterio(indiceActual + 1);
                } else {
                    alert("¡Has terminado las meditaciones del día! Dios te bendiga.");
                    window.location.href = 'index.html';
                }
            });
        }

        if (btnAnterior) {
            btnAnterior.addEventListener('click', (e) => {
                e.preventDefault();
                if (indiceActual > 0) {
                    cargarContenidoMisterio(indiceActual - 1);
                } else {
                    window.location.href = 'index.html';
                }
            });
        }
    });
</script>
</body>
</html>
