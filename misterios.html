<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&amp;family=Source+Serif+4:ital,wght@0,400;0,600;1,400&amp;family=Plus+Jakarta+Sans:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "error": "#ba1a1a",
                    "surface-dim": "#dbd9d9",
                    "surface-container-low": "#f5f3f3",
                    "on-error-container": "#93000a",
                    "secondary-fixed-dim": "#e9c176",
                    "on-primary-fixed": "#1c1b1b",
                    "primary": "#000000",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed-dim": "#c9c6c0",
                    "inverse-on-surface": "#f2f0f0",
                    "on-primary-fixed-variant": "#474746",
                    "secondary-fixed": "#ffdea5",
                    "on-secondary": "#ffffff",
                    "surface-variant": "#e4e2e2",
                    "on-primary": "#ffffff",
                    "on-surface": "#1b1c1c",
                    "outline": "#747878",
                    "background": "#fbf9f8",
                    "tertiary": "#000000",
                    "secondary": "#775a19",
                    "surface-container": "#efeded",
                    "inverse-surface": "#303030",
                    "on-secondary-container": "#785a1a",
                    "tertiary-fixed": "#e5e2db",
                    "on-primary-container": "#858383",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-container": "#1c1c18",
                    "on-error": "#ffffff",
                    "on-secondary-fixed-variant": "#5d4201",
                    "surface-container-high": "#eae8e7",
                    "on-tertiary-container": "#85847e",
                    "primary-fixed-dim": "#c8c6c5",
                    "surface": "#fbf9f8",
                    "inverse-primary": "#c8c6c5",
                    "error-container": "#ffdad6",
                    "surface-tint": "#5f5e5e",
                    "on-background": "#1b1c1c",
                    "on-tertiary-fixed": "#1c1c18",
                    "surface-container-highest": "#e4e2e2",
                    "outline-variant": "#c4c7c7",
                    "primary-container": "#1c1b1b",
                    "on-secondary-fixed": "#261900",
                    "surface-bright": "#fbf9f8",
                    "secondary-container": "#fed488",
                    "primary-fixed": "#e5e2e1",
                    "on-surface-variant": "#444748",
                    "on-tertiary-fixed-variant": "#474742",
                    "deep-blue": "#1E3A5F",
                    "gold": "#C9A227",
                    "gold-high": "#A6821D"
            },
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "1.25rem",
                    "xl": "2rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "margin-desktop": "64px",
                    "base": "8px",
                    "max-width": "1280px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "label": ["Plus Jakarta Sans", "sans-serif"],
                    "headline": ["Playfair Display", "serif"],
                    "body": ["Source Serif 4", "serif"]
            },
            "fontSize": {
                    "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "display-lg-mobile": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-lg": ["20px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-sm": ["26px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "headline-md": ["34px", {"lineHeight": "1.3", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }
        .slow-fade-400ms {
            transition: all 400ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            min-height: 100dvh;
            -webkit-tap-highlight-color: transparent;
        }
        .touch-target {
            min-height: 48px;
            min-width: 48px;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-deep-blue shadow-lg">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-4xl mx-auto">
<div class="flex items-center gap-3">
<span aria-hidden="true" class="material-symbols-outlined text-gold text-2xl">menu_book</span>
<h1 class="font-headline text-xl font-bold text-gold tracking-widest uppercase">EL SANTO ROSARIO</h1>
</div>
<button aria-label="Abrir ajustes" class="text-gold font-label text-sm font-bold tracking-widest hover:bg-white/10 px-4 py-2 rounded-lg transition-colors uppercase touch-target">
            AJUSTES
        </button>
</div>
</header>
<main class="pt-32 pb-44 px-6 max-w-4xl mx-auto">
<!-- Minimalist Header -->
<section class="mb-12">
<h2 class="font-headline text-5xl md:text-7xl text-deep-blue leading-tight font-light italic">
            Seleccionar Misterios
        </h2>
<div aria-hidden="true" class="h-1.5 w-24 bg-gold mt-6 rounded-full"></div>
</section>
<!-- Mystery Selection Cards -->
<div class="grid grid-cols-1 gap-6" role="list">
<!-- Misterios Gozosos (Active/Selected recommendation) -->
<button aria-label="Misterios Gozosos, Lunes y Sábado. Comenzar oración." class="group relative flex flex-col items-start p-8 md:p-10 bg-deep-blue rounded-xl text-left shadow-xl slow-fade-400ms hover:translate-y-[-4px] active:scale-[0.98] overflow-hidden focus:outline-none focus:ring-4 focus:ring-gold/50" onclick="window.location.href='#'" role="listitem">
<div class="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="font-label text-sm tracking-[0.2em] text-gold/90 mb-3 uppercase font-bold">LUNES Y SÁBADO</span>
<span class="font-headline text-3xl md:text-4xl text-gold mb-10">Misterios Gozosos</span>
<div class="flex items-center gap-3 text-gold">
<span class="font-label text-base tracking-widest font-bold"> COMENZAR ORACIÓN </span>
<span aria-hidden="true" class="material-symbols-outlined text-2xl">arrow_forward</span>
</div>
</button>
<!-- Misterios Dolorosos -->
<button aria-label="Misterios Dolorosos, Martes y Viernes. Comenzar oración." class="group relative flex flex-col items-start p-8 md:p-10 bg-surface-container-high rounded-xl text-left slow-fade-400ms hover:bg-surface-container-highest hover:translate-y-[-4px] active:scale-[0.98] overflow-hidden focus:outline-none focus:ring-4 focus:ring-deep-blue/30" onclick="window.location.href='#'" role="listitem">
<span class="font-label text-sm tracking-[0.2em] text-deep-blue/70 mb-3 uppercase font-bold">MARTES Y VIERNES</span>
<span class="font-headline text-3xl md:text-4xl text-deep-blue mb-10">Misterios Dolorosos</span>
<div class="flex items-center gap-3 text-deep-blue">
<span class="font-label text-base tracking-widest font-bold"> COMENZAR ORACIÓN </span>
<span aria-hidden="true" class="material-symbols-outlined text-2xl">arrow_forward</span>
</div>
</button>
<!-- Misterios Gloriosos -->
<button aria-label="Misterios Gloriosos, Miércoles y Domingo. Comenzar oración." class="group relative flex flex-col items-start p-8 md:p-10 bg-surface-container-high rounded-xl text-left slow-fade-400ms hover:bg-surface-container-highest hover:translate-y-[-4px] active:scale-[0.98] overflow-hidden focus:outline-none focus:ring-4 focus:ring-deep-blue/30" onclick="window.location.href='#'" role="listitem">
<span class="font-label text-sm tracking-[0.2em] text-deep-blue/70 mb-3 uppercase font-bold">MIÉRCOLES Y DOMINGO</span>
<span class="font-headline text-3xl md:text-4xl text-deep-blue mb-10">Misterios Gloriosos</span>
<div class="flex items-center gap-3 text-deep-blue">
<span class="font-label text-base tracking-widest font-bold"> COMENZAR ORACIÓN </span>
<span aria-hidden="true" class="material-symbols-outlined text-2xl">arrow_forward</span>
</div>
</button>
<!-- Misterios Luminosos -->
<button aria-label="Misterios Luminosos, Jueves. Comenzar oración." class="group relative flex flex-col items-start p-8 md:p-10 bg-surface-container-high rounded-xl text-left slow-fade-400ms hover:bg-surface-container-highest hover:translate-y-[-4px] active:scale-[0.98] overflow-hidden focus:outline-none focus:ring-4 focus:ring-deep-blue/30" onclick="window.location.href='#'" role="listitem">
<span class="font-label text-sm tracking-[0.2em] text-deep-blue/70 mb-3 uppercase font-bold">JUEVES</span>
<span class="font-headline text-3xl md:text-4xl text-deep-blue mb-10">Misterios Luminosos</span>
<div class="flex items-center gap-3 text-deep-blue">
<span class="font-label text-base tracking-widest font-bold"> COMENZAR ORACIÓN </span>
<span aria-hidden="true" class="material-symbols-outlined text-2xl">arrow_forward</span>
</div>
</button>
</div>
<!-- Decorative Quote Card -->
<aside aria-label="Cita inspiradora" class="mt-20 p-10 bg-white rounded-xl text-center border border-surface-container-highest shadow-sm">
<p class="font-headline text-3xl text-gold-high italic leading-relaxed">
            "El Rosario es la oración que acompaña siempre la vida, es también la oración de los sencillos y de los santos."
        </p>
<p aria-label="Autor: Papa Francisco" class="font-label text-sm tracking-widest text-on-surface-variant mt-8 font-bold uppercase">— PAPA FRANCISCO</p>
</aside>
</main>
<!-- BottomNavBar -->
<nav aria-label="Navegación principal" class="fixed bottom-0 w-full z-50 bg-deep-blue/95 backdrop-blur-md px-6 py-4 pb-safe shadow-[0_-4px_32px_rgba(0,0,0,0.4)]">
<div class="flex justify-between gap-6 max-w-4xl mx-auto">
<button aria-label="Ir al paso anterior" class="flex-1 flex flex-col items-center justify-center text-gold py-3 px-4 rounded-xl hover:bg-white/10 active:scale-95 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-gold/50 touch-target">
<span aria-hidden="true" class="material-symbols-outlined mb-1 text-2xl">arrow_back_ios</span>
<span class="font-label text-[12px] font-bold tracking-[0.15em] uppercase">ANTERIOR</span>
</button>
<button aria-label="Ir al paso siguiente" class="flex-1 flex flex-col items-center justify-center text-gold py-3 px-4 rounded-xl hover:bg-white/10 active:scale-95 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-gold/50 touch-target">
<span aria-hidden="true" class="material-symbols-outlined mb-1 text-2xl">arrow_forward_ios</span>
<span class="font-label text-[12px] font-bold tracking-[0.15em] uppercase">SIGUIENTE</span>
</button>
</div>
</nav>
<!-- Hidden Sidebar (Drawer) -->
<div aria-label="Menú lateral" aria-modal="true" class="fixed left-0 top-0 h-full max-w-[300px] w-full bg-surface shadow-2xl -translate-x-full transition-transform duration-500 z-[60]" id="drawer" role="dialog">
<div class="p-8 flex flex-col gap-10">
<h3 class="font-headline font-bold text-deep-blue text-2xl tracking-tight uppercase">Santuario Digital</h3>
<nav class="flex flex-col gap-3">
<a aria-current="page" class="flex items-center gap-4 p-5 text-deep-blue bg-surface-container-high font-bold rounded-xl transition-all touch-target" href="#">
<span aria-hidden="true" class="material-symbols-outlined text-2xl">church</span>
<span class="font-headline text-xl">MISTERIOS</span>
</a>
<a class="flex items-center gap-4 p-5 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all touch-target" href="#">
<span aria-hidden="true" class="material-symbols-outlined text-2xl">auto_stories</span>
<span class="font-headline text-xl">ORACIONES</span>
</a>
<a class="flex items-center gap-4 p-5 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all touch-target" href="#">
<span aria-hidden="true" class="material-symbols-outlined text-2xl">volume_up</span>
<span class="font-headline text-xl">AUDIO</span>
</a>
<a class="flex items-center gap-4 p-5 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all touch-target" href="#">
<span aria-hidden="true" class="material-symbols-outlined text-2xl">settings</span>
<span class="font-headline text-xl">AJUSTES</span>
</a>
</nav>
</div>
</div>
</body></html>
