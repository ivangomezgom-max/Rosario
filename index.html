<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Open+Sans:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#FBF9F8", 
                    "primary": "#1E3A5F", 
                    "secondary": "#C9A227", 
                    "on-primary": "#ffffff",
                    "on-surface": "#1B1C1C",
                    "surface-container": "#F5F3F3",
                    "outline": "#747878"
            },
            "fontFamily": {
                    "display": ["Playfair Display", "serif"],
                    "body": ["Open Sans", "sans-serif"],
                    "prayer-quote": ["EB Garamond", "serif"]
            },
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 0, 'opsz' 24; }
        body { min-height: 100dvh; font-family: 'Open Sans', sans-serif; }
        #dynamic-bg { transition: background-image 0.8s ease-in-out; }
        .text-shadow-sm { text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .custom-scroll-container { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-surface text-on-surface flex flex-col relative min-h-screen">

<!-- Capas de Fondo Dinámico (Para el Home y los Misterios) -->
<div aria-hidden="true" class="fixed inset-0 pointer-events-none z-[-2] bg-cover bg-center bg-no-repeat transition-all duration-700" id="dynamic-bg"></div>
<!-- Filtro oscuro para garantizar el contraste de los textos superiores -->
<div aria-hidden="true" class="fixed inset-0 pointer-events-none z-[-1] bg-primary/60 backdrop-brightness-75" id="bg-overlay"></div>

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-primary/90 backdrop-blur-md shadow-lg border-b border-secondary/20 flex justify-between items-center px-6 py-4" role="banner">
    <div class="flex items-center gap-3">
        <span aria-hidden="true" class="material-symbols-outlined text-secondary text-2xl">menu_book</span>
        <h1 class="font-display text-lg font-bold text-secondary uppercase tracking-[0.15em]">EL SANTO ROSARIO</h1>
    </div>
    <button id="btn-header-accion" class="bg-transparent border border-white/20 shadow-lg rounded-xl px-4 py-2 text-on-primary/70 text-xs font-bold hover:bg-secondary hover:text-primary transition-all">
        MENÚ
    </button>
</header>

<!-- CONTENEDOR PRINCIPAL -->
<main class="flex-1 flex flex-col pt-20 pb-28 overflow-y-auto custom-scroll-container z-10 w-full px-4 items-center justify-start">

    <!-- SECCIÓN 1: PANTALLA DE INICIO -->
    <div id="pantalla-inicio" class="w-full max-w-md flex flex-col items-center justify-center space-y-6 my-auto relative py-4">
        <div class="absolute inset-0 z-0 opacity-10 pointer-events-none flex items-center justify-center">
            <span aria-hidden="true" class="material-symbols-outlined text-[24rem] text-white">church</span>
        </div>
        
        <section class="w-full text-center z-10">
            <div class="flex flex-col items-center space-y-1">
                <div class="inline-block px-6 py-1.5 bg-secondary/20 backdrop-blur-md rounded-full border border-secondary/40 mb-2">
                    <span class="font-body text-[10px] uppercase tracking-[0.25rem] text-secondary font-bold">Presencia Sagrada</span>
                </div>
                <h2 id="reloj-digital" class="font-display text-5xl font-medium text-white text-shadow-sm tracking-tight">--:--</h2>
                <p id="fecha-actual" class="font-display text-lg text-white/90 italic">Cargando fecha...</p>
            </div>
        </section>

        <!-- IMAGEN DEL HOME CON TAMAÑO CONTROLADO -->
        <div class="w-full max-w-[280px] z-10 shadow-2xl rounded-2xl overflow-hidden border-2 border-secondary/40 aspect-[4/3] bg-primary/20">
            <img src="imagenes/home.jpg" alt="Santo Rosario Devoción" class="w-full h-full object-contain object-center">
        </div>

        <section class="w-full z-10">
            <div class="relative group">
                <div class="absolute -inset-2 bg-secondary/20 rounded-xl blur-xl transition-all duration-500"></div>
                <button id="btn-comenzar-rosario" class="relative w-full bg-white rounded-xl shadow-2xl flex flex-col items-center justify-center p-5 border-2 border-secondary overflow-hidden active:scale-95 transition-transform">
                    <span class="font-body text-primary text-[10px] tracking-[0.3em] mb-2 uppercase font-extrabold">COMENZAR LA ORACIÓN</span>
                    <span class="font-display text-xl text-primary text-center leading-tight">
                        Rezar los Misterios de Hoy
                        <span id="texto-misterio-hoy" class="block mt-1 text-secondary font-display text-sm italic font-medium">
                            ...
                        </span>
                    </span>
                </button>
            </div>
            <blockquote class="mt-4 text-center">
                <p class="font-prayer-quote text-secondary font-medium italic text-base max-w-xs mx-auto leading-snug drop-shadow-sm">
                    "Donde están dos o tres congregados en mi nombre, allí estoy yo en medio de ellos."
                </p>
            </blockquote>
        </section>
    </div>

    <!-- SECCIÓN 2: PANTALLA DE ORACIÓN (Efecto Transparencia Inmersiva) -->
    <div id="pantalla-oracion" class="hidden w-full max-w-xl flex flex-col space-y-4 py-2 my-auto">
        
        <!-- Tarjeta estilo "Glassmorphism" (Efecto Vitral Translúcido) -->
        <div class="bg-white/85 backdrop-blur-lg rounded-2xl p-5 shadow-2xl border border-white/40 flex flex-col space-y-4 transition-all duration-300">
            
            <div class="flex justify-between items-center border-b border-primary/10 pb-2">
                <span id="txt-contador-pasos" class="text-primary font-body text-xs font-bold tracking-wider uppercase">MISTERIO 1 DE 5</span>
                <span class="bg-primary/20 text-primary px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider" id="tag-tipo-misterio">MEDITACIÓN</span>
            </div>
            
            <h3 id="txt-titulo-misterio" class="font-display text-xl md:text-2xl text-primary font-bold text-center leading-tight">Cargando Misterio...</h3>
            
            <!-- CONTENEDOR SEGURO: La imagen se escala de forma inteligente aquí sin desbordar ni cortarse jamás -->
            <div class="w-full h-40 md:h-48 rounded-xl overflow-hidden bg-black/5 flex items-center justify-center border border-primary/5">
                <img id="img-misterio" src="" alt="Ilustración del Misterio" class="w-full h-full object-contain object-center">
            </div>

            <!-- Texto de la meditación con scroll interno sutil si es muy largo, evitando deformar el layout móvil -->
            <div class="max-h-44 overflow-y-auto pr-1 custom-scroll-container">
                <p id="txt-meditacion-misterio" class="font-body text-on-surface text-sm md:text-base leading-relaxed text-justify whitespace-pre-line">
                    Cargando la meditación correspondiente...
                </p>
            </div>

            <!-- Contenedor del Audio Guía integrado elegantemente -->
            <div class="bg-primary/5 rounded-xl p-3 flex flex-col items-center justify-center space-y-2 border border-primary/10 mt-1">
                <span class="text-[10px] font-bold tracking-widest text-primary/70 uppercase">Audio Guía</span>
                <div class="flex items-center space-x-6">
                    <button id="audio-btn-rewind" class="text-primary/70 hover:text-secondary active:scale-90 transition-transform">
                        <span class="material-symbols-outlined text-2xl">replay_10</span>
                    </button>
                    <button id="audio-btn-play" class="w-12 h-12 bg-secondary text-primary rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                        <span id="audio-icon" class="material-symbols-outlined text-2xl font-bold">play_arrow</span>
                    </button>
                    <button id="audio-btn-forward" class="text-primary/70 hover:text-secondary active:scale-90 transition-transform">
                        <span class="material-symbols-outlined text-2xl">forward_10</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- SECCIÓN 3: PANTALLA DE SELECCIÓN MANUAL -->
    <div id="pantalla-ajustes" class="hidden w-full max-w-md flex flex-col py-4 my-auto">
        <div class="bg-white/90 backdrop-blur-md rounded-2xl p-6 shadow-2xl border border-secondary/30 text-center">
            <h3 class="font-display text-2xl text-primary font-bold mb-6 uppercase tracking-wider">Seleccionar Misterios</h3>
            <div class="flex flex-col space-y-3.5" id="lista-seleccion-misterios">
                <button class="w-full py-3 rounded-xl border border-secondary/40 text-primary font-body font-semibold bg-surface hover:bg-secondary/10 transition-colors" onclick="cambiarMisterioManual('Gozosos')">Misterios Gozosos (Lunes y Sábado)</button>
                <button class="w-full py-3 rounded-xl border border-secondary/40 text-primary font-body font-semibold bg-surface hover:bg-secondary/10 transition-colors" onclick="cambiarMisterioManual('Dolorosos')">Misterios Dolorosos (Martes y Viernes)</button>
                <button class="w-full py-3 rounded-xl border border-secondary/40 text-primary font-body font-semibold bg-surface hover:bg-secondary/10 transition-colors" onclick="cambiarMisterioManual('Gloriosos')">Misterios Gloriosos (Miércoles y Domingo)</button>
                <button class="w-full py-3 rounded-xl border border-secondary/40 text-primary font-body font-semibold bg-surface hover:bg-secondary/10 transition-colors" onclick="cambiarMisterioManual('Luminosos')">Misterios Luminosos (Jueves)</button>
            </div>
        </div>
    </div>

</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full h-24 z-50 bg-primary/95 backdrop-blur-md flex justify-around items-center px-6 pb-safe shadow-[0_-4px_24px_rgba(0,0,0,0.5)] border-t border-white/10" role="navigation">
    <button id="btn-nav-anterior" class="flex flex-col items-center justify-center text-on-primary/40 px-6 py-2 transition-all rounded-lg cursor-not-allowed" disabled>
        <span aria-hidden="true" class="material-symbols-outlined mb-1 text-2xl">arrow_back_ios</span>
        <span class="font-body text-[10px] font-bold tracking-widest uppercase">ANTERIOR</span>
    </button>
    <button id="btn-nav-siguiente" class="flex flex-col items-center justify-center bg-secondary border border-secondary shadow-lg rounded-xl px-10 py-3 text-primary transition-all transform scale-105 active:scale-100">
        <span aria-hidden="true" class="material-symbols-outlined mb-1 text-2xl font-bold">arrow_forward_ios</span>
        <span class="font-body text-[10px] font-bold tracking-widest uppercase" id="lbl-nav-siguiente">SIGUIENTE</span>
    </button>
</nav>

<audio id="audio-rosario-master" preload="auto"></audio>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const vistaInicio = document.getElementById('pantalla-inicio');
    const vistaOracion = document.getElementById('pantalla-oracion');
    const vistaAjustes = document.getElementById('pantalla-ajustes');
    
    const btnHeader = document.getElementById('btn-header-accion');
    const btnComenzar = document.getElementById('btn-comenzar-rosario');
    const btnNavAnterior = document.getElementById('btn-nav-anterior');
    const btnNavSiguiente = document.getElementById('btn-nav-siguiente');
    const lblNavSiguiente = document.getElementById('lbl-nav-siguiente');
    const contenedorPrincipal = document.querySelector('main');
    const capaFondo = document.getElementById('dynamic-bg');

    let modoActual = 'inicio'; 

    const audioMotor = document.getElementById('audio-rosario-master');
    const btnPlay = document.getElementById('audio-btn-play');
    const iconPlay = document.getElementById('audio-icon');
    const btnRewind = document.getElementById('audio-btn-rewind');
    const btnForward = document.getElementById('audio-btn-forward');
    const imgMisterio = document.getElementById('img-misterio');

    let listaMisterios = [];
    let indiceActual = 0;
    const diasSemana = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    
    let tipoMisterioActual = '';
    let hoy = '';

    // Fondos por defecto para el menú y el home
    const fondosPorDefecto = [
        'https://images.unsplash.com/photo-1548625361-998801f99c83?q=80&w=2071&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1515516089376-88db1e26e9c0?q=80&w=2070&auto=format&fit=crop'
    ];
    let fondoHomeAleatorio = fondosPorDefecto[Math.floor(Math.random() * fondosPorDefecto.length)];

    function calcularMisterioPorDia() {
        hoy = diasSemana[new Date().getDay()];
        let misterioAsignado = 'Gozosos';
        if (hoy === 'Martes' || hoy === 'Viernes') misterioAsignado = 'Dolorosos';
        else if (hoy === 'Miércoles' || hoy === 'Domingo') misterioAsignado = 'Gloriosos';
        else if (hoy === 'Jueves') misterioAsignado = 'Luminosos';

        tipoMisterioActual = localStorage.getItem('misterioSeleccionado') || misterioAsignado;
    }
    calcularMisterioPorDia();

    function cambiarVista(nuevaVista) {
        modoActual = nuevaVista;
        vistaInicio.classList.add('hidden');
        vistaOracion.classList.add('hidden');
        vistaAjustes.classList.add('hidden');
        
        contenedorPrincipal.scrollTop = 0;

        if (nuevaVista === 'inicio') {
            localStorage.removeItem('misterioSeleccionado');
            calcularMisterioPorDia();
            refrescarEtiquetaInicio();
            cargarDatosRosario();
            
            // Regresa al fondo base abstracto en el Home
            capaFondo.style.backgroundImage = `url('${fondoHomeAleatorio}')`;

            vistaInicio.classList.remove('hidden');
            btnHeader.textContent = 'MENÚ';
            btnNavAnterior.disabled = true;
            btnNavAnterior.className = "flex flex-col items-center justify-center text-on-primary/40 px-6 py-2 cursor-not-allowed";
            lblNavSiguiente.textContent = "SIGUIENTE";
        } else if (nuevaVista === 'oracion') {
            vistaOracion.classList.remove('hidden');
            btnHeader.textContent = 'INICIO';
            btnNavAnterior.disabled = false;
            btnNavAnterior.className = "flex flex-col items-center justify-center text-on-primary/70 px-6 py-2 hover:text-secondary";
            if(listaMisterios.length > 0) {
                renderizarMisterio(indiceActual);
            }
            actualizarBotonesNavegacion();
        } else if (nuevaVista === 'ajustes') {
            capaFondo.style.backgroundImage = `url('${fondoHomeAleatorio}')`;
            vistaAjustes.classList.remove('hidden');
            btnHeader.textContent = 'INICIO';
        }
    }

    // Inicializar primer fondo
    capaFondo.style.backgroundImage = `url('${fondoHomeAleatorio}')`;

    const opcionesFecha = { weekday: 'long', day: 'numeric', month: 'long' };
    let fechaTxt = new Date().toLocaleDateString('es-ES', opcionesFecha);
    document.getElementById('fecha-actual').textContent = fechaTxt.charAt(0).toUpperCase() + fechaTxt.slice(1);
    
    function refrescarEtiquetaInicio() {
        document.getElementById('texto-misterio-hoy').textContent = `(Misterios ${tipoMisterioActual} — ${hoy})`;
    }
    refrescarEtiquetaInicio();

    window.cargarDatosRosario = function() {
        fetch('rosario.json')
          .then(res => res.json())
          .then(data => {
            const filtro = tipoMisterioActual.endsWith('osos') ? tipoMisterioActual.slice(0, -1) : tipoMisterioActual;
            listaMisterios = data.filter(item => item["Tipo de Misterio"] && item["Tipo de Misterio"].includes(filtro));
            if(listaMisterios.length > 0 && modoActual === 'oracion') {
                renderizarMisterio(0);
            }
          }).catch(err => console.error("Error leyendo JSON:", err));
    }
    cargarDatosRosario();

    function renderizarMisterio(idx) {
        if (idx < 0 || idx >= listaMisterios.length) return;
        indiceActual = idx;
        const item = listaMisterios[indiceActual];

        document.getElementById('txt-contador-pasos').textContent = `Misterio ${indiceActual + 1} de 5`;
        document.getElementById('txt-titulo-misterio').textContent = item["Título del Misterio"];
        document.getElementById('txt-meditacion-misterio').textContent = item["Texto de Meditación"];
        document.getElementById('tag-tipo-misterio').textContent = item["Tipo de Misterio"] || 'MEDITACIÓN';

        // Gestión de la Imagen tanto en el contenedor como en el FONDO GENERAL de la Pantalla
        if (item["Enlace de Imagen"]) {
            imgMisterio.src = item["Enlace de Imagen"];
            imgMisterio.style.display = "block";
            // ¡Magia! El fondo de la app cambia dinámicamente a la ilustración actual
            capaFondo.style.backgroundImage = `url('${item["Enlace de Imagen"]}')`;
        } else {
            imgMisterio.style.display = "none";
            capaFondo.style.backgroundImage = `url('${fondoHomeAleatorio}')`;
        }

        audioMotor.pause();
        iconPlay.textContent = 'play_arrow';
        if (item["Enlace de Audio"]) {
            audioMotor.src = item["Enlace de Audio"];
            audioMotor.load();
        }
    }

    function actualizarBotonesNavegacion() {
        lblNavSiguiente.textContent = (indiceActual === listaMisterios.length - 1) ? "FINALIZAR" : "SIGUIENTE";
    }

    window.cambiarMisterioManual = function(tipo) {
        tipoMisterioActual = tipo;
        localStorage.setItem('misterioSeleccionado', tipo);
        refrescarEtiquetaInicio();
        indiceActual = 0; // Reiniciar contador al cambiar manualmente
        cargarDatosRosario();
        cambiarVista('oracion');
    }

    btnHeader.addEventListener('click', () => {
        if (modoActual === 'inicio') cambiarVista('ajustes');
        else {
            audioMotor.pause();
            iconPlay.textContent = 'play_arrow';
            indiceActual = 0;
            cambiarVista('inicio');
        }
    });

    btnComenzar.addEventListener('click', () => {
        indiceActual = 0;
        cambiarVista('oracion');
    });

    btnNavAnterior.addEventListener('click', () => {
        if (modoActual === 'oracion' && indiceActual > 0) {
            renderizarMisterio(indiceActual - 1);
            actualizarBotonesNavegacion();
            contenedorPrincipal.scrollTop = 0;
        }
    });

    btnNavSiguiente.addEventListener('click', () => {
        if (modoActual === 'inicio' || modoActual === 'ajustes') {
            indiceActual = 0;
            cambiarVista('oracion');
        } else if (modoActual === 'oracion') {
            if (indiceActual < listaMisterios.length - 1) {
                renderizarMisterio(indiceActual + 1);
                actualizarBotonesNavegacion();
                contenedorPrincipal.scrollTop = 0; 
            } else {
                alert("¡Has terminado las meditaciones del día! Dios te bendiga.");
                audioMotor.pause();
                indiceActual = 0;
                cambiarVista('inicio');
            }
        }
    });

    btnPlay.addEventListener('click', () => {
        if (audioMotor.paused) {
            audioMotor.play()
                .then(() => { iconPlay.textContent = 'pause'; })
                .catch((error) => {
                    console.error("Error de reproducción:", error);
                    iconPlay.textContent = 'play_arrow';
                });
        } else {
            audioMotor.pause();
            iconPlay.textContent = 'play_arrow';
        }
    });

    btnRewind.addEventListener('click', () => { audioMotor.currentTime = Math.max(0, audioMotor.currentTime - 10); });
    btnForward.addEventListener('click', () => { audioMotor.currentTime = Math.min(audioMotor.duration || 0, audioMotor.currentTime + 10); });

    const actualizarReloj = () => {
        const d = new Date();
        let h = d.getHours();
        const m = String(d.getMinutes()).padStart(2, '0');
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        document.getElementById('reloj-digital').innerHTML = `${h}:${m} <span class="text-xl align-middle opacity-80">${ampm}</span>`;
    };
    actualizarReloj(); setInterval(actualizarReloj, 60000);
});
</script>
</body>
</html>
